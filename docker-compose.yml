services:

  redis:
    image: redis:alpine
    container_name: redis-server

    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: containers/api/Dockerfile

    container_name: sandbox-api

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - shared-temp:/app/temp

    depends_on:
      - redis

volumes:
  shared-temp: